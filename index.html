<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ツムツムv2.4 | BUILD 20260301-152500</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="wf">

  <header class="topbar wf-topbar">
    <div class="wf-title">ツムツムv2.4</div>

    <div class="wf-hud">
      <div class="wf-hud-label">スコア</div>
      <div class="wf-hud-label">ハイスコア</div>
      <div class="wf-hud-label">コンボ</div>
      <div class="wf-hud-label">倍率</div>
      <div class="wf-hud-label">残り</div>
      <div class="wf-hud-label">フィーバー</div>

      <div class="wf-hud-box" id="score">0</div>
      <div class="wf-hud-box" id="hiscore">0</div>
      <div class="wf-hud-box" id="combo">0</div>
      <div class="wf-hud-box"><span id="mult">x1.00</span></div>
      <div class="wf-hud-box"><span id="time">60.0</span>s</div>
      <div class="wf-hud-box">
        <div class="wf-fever">
          <div class="wf-fever-fill" id="feverFill"></div>
        </div>
      </div>
    </div>

    <div class="wf-controls">
      <button id="btnStart" class="wf-btn">スタート</button>
      <button id="btnPause" class="wf-btn" disabled>一時停止</button>
      <button id="btnReset" class="wf-btn">リセット</button>
      <button id="btnAnim" class="wf-btn">アニメ: ON</button>
      <button id="btnSound" class="wf-btn">効果音: ON</button>

      <span class="wf-spacer"></span>

      <label class="wf-label">テーマ</label>
      <select id="themeSelect" class="wf-select">
        <option value="default">通常</option>
        <option value="space">宇宙エネルギー玉</option>
      </select>
    </div>
  </header>

  <main class="stage wf-stage">
    <div class="panel wf-panel">
      <div class="canvasWrap wf-canvasWrap" id="canvasWrap">
        <canvas id="game" aria-label="game canvas"></canvas>
      </div>
    </div>
  </main>

  <footer class="wf-footer">
    <details class="hintDetails wf-hint">
      <summary>操作説明（タップして開く）</summary>
      <div class="hint">
        <div>🖱️/👆 同じ顔を「なぞって」つなげる → 指を離すと消えます（3個以上で成立）。</div>
        <div>💣 ボムは <b>クリック/タップ</b> で爆発（周囲を消去）します。</div>
        <div>⌨️ スペース: 一時停止 / R: リセット / A: アニメON/OFF / S: 効果音ON/OFF</div>
      </div>
    </details>

    <div class="buildBadge wf-build">BUILD 20260301-152500</div>
  </footer>

  <script src="game.js"></script>
</body>
</html>
